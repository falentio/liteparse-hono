# fly.toml app configuration file generated for liteparse-hono on 2026-06-15T19:17:16+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'liteparse-hono'
primary_region = 'iad'

[build]

[http_service]
internal_port = 5707
force_https = true
auto_stop_machines = 'suspend'
auto_start_machines = true
min_machines_running = 0
max_machines_running = 10
processes = ['app']

[[http_service.checks]]
grace_period = "10s"
interval = "60s"
method = "GET"
timeout = "5s"
path = "/health"

[http_service.concurrency]
type = "requests"
soft_limit = 2
hard_limit = 4

[[vm]]
memory = '2gb'
cpu_kind = 'performance'
cpus = 1
memory_mb = 2048
